<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatial Audio Volume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage" id="stage" tabindex="0" aria-label="Spatial audio field">
    <svg id="field" viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="Top-down spatial field showing two apps balanced around the listener">
      <rect width="420" height="300" fill="#faf9f5"/>

      <g id="grid-dots" aria-hidden="true"></g>

      <line id="track" x1="40" y1="150" x2="380" y2="150"
            stroke="#d0cec8" stroke-width="2" stroke-dasharray="6,4"/>

      <text x="36" y="168" fill="#aaa" font-size="14" font-family="Caveat" text-anchor="middle">L</text>
      <text x="384" y="168" fill="#aaa" font-size="14" font-family="Caveat" text-anchor="middle">R</text>

      <line id="dist-line-1" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      <line id="dist-line-2" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

      <g id="app-1" class="app-group" aria-label="left slot, 50%">
        <circle id="bubble-1" cx="90" cy="150" r="22" fill="#fff" stroke="#c0392b" stroke-width="2"/>
        <text id="label-1" x="90" y="155" fill="#c0392b" font-size="14" font-family="Caveat"
              font-weight="700" text-anchor="middle">VLC</text>
        <rect id="badge-1" x="74" y="118" width="32" height="16" rx="3" fill="#c0392b" opacity="0.9"/>
        <text id="vol-1" x="90" y="131" fill="#fff" font-size="12" font-family="Caveat"
              text-anchor="middle">50%</text>
      </g>

      <g id="app-2" class="app-group" aria-label="right slot, 50%">
        <circle id="bubble-2" cx="330" cy="150" r="22" fill="#fff" stroke="#27ae60" stroke-width="2"/>
        <text id="label-2" x="330" y="155" fill="#27ae60" font-size="13" font-family="Caveat"
              font-weight="700" text-anchor="middle">ScrCpy</text>
        <rect id="badge-2" x="314" y="118" width="32" height="16" rx="3" fill="#27ae60" opacity="0.9"/>
        <text id="vol-2" x="330" y="131" fill="#fff" font-size="12" font-family="Caveat"
              text-anchor="middle">50%</text>
      </g>

      <g id="head" class="head" tabindex="0" role="slider"
         aria-label="Listener position. Left favors VLC, right favors ScrCpy."
         aria-valuemin="-100" aria-valuemax="100" aria-valuenow="0">
        <ellipse id="head-ellipse" cx="210" cy="150" rx="11" ry="18"
                 fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
        <text id="head-label" x="210" y="182" fill="#888" font-size="11"
              font-family="Caveat" text-anchor="middle">you</text>
      </g>

      <rect x="150" y="264" width="120" height="22" rx="4" fill="#d0cec8" opacity="0.6"/>
      <text x="210" y="280" fill="#777" font-size="12" font-family="Caveat" text-anchor="middle">
        ← → · drag head
      </text>

      <text x="8" y="14" fill="#aaa" font-size="11" font-family="Caveat">closer = louder</text>
    </svg>

    <button id="mini-enter-btn" class="mini-enter" type="button"
            aria-label="Enter Mini Mode" title="Modo Mini">
      <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
        <rect x="2" y="5" width="12" height="8" rx="1.5"
              fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span>Modo Mini</span>
    </button>

    <section class="stack-wrap" aria-label="Other audio sources">
      <header class="stack-header">
        <span class="stack-title">other apps</span>
        <span class="stack-hint" id="stack-hint">click a bubble, then click here to swap</span>
      </header>
      <div id="stack" class="stack"></div>
    </section>

    <div class="status" id="status" aria-live="polite">centered</div>
  </main>

  <div id="mini-bar" class="mini-bar" data-tauri-drag-region aria-label="Mini Mode">
    <div class="mini-app left" data-tauri-drag-region>
      <span id="mini-label-1" class="mini-name">VLC</span>
      <span id="mini-vol-1" class="mini-vol">50%</span>
    </div>
    <svg id="mini-field" class="mini-field" viewBox="0 0 240 40"
         data-tauri-drag-region="false"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="20" y1="20" x2="220" y2="20"
            stroke="#d0cec8" stroke-width="2" stroke-dasharray="4,3"/>
      <line id="mini-dist-1" x1="20" y1="20" x2="120" y2="20"
            stroke="#c0392b" stroke-width="1.5" opacity="0.55"/>
      <line id="mini-dist-2" x1="120" y1="20" x2="220" y2="20"
            stroke="#27ae60" stroke-width="1.5" opacity="0.55"/>
      <g id="mini-head" class="head" tabindex="0" role="slider"
         aria-label="Listener position">
        <ellipse id="mini-head-ellipse" cx="120" cy="20" rx="7" ry="11"
                 fill="#fff" stroke="#1a1a1a" stroke-width="1.5"/>
      </g>
    </svg>
    <div class="mini-app right" data-tauri-drag-region>
      <span id="mini-label-2" class="mini-name">ScrCpy</span>
      <span id="mini-vol-2" class="mini-vol">50%</span>
    </div>
    <button id="mini-exit-btn" class="mini-exit" type="button"
            data-tauri-drag-region="false"
            aria-label="Hold 3 seconds to exit Mini Mode"
            title="Mantené apretado para salir">
      <span class="hold-fill" aria-hidden="true"></span>
      <span class="mini-exit-glyph" aria-hidden="true">⤢</span>
    </button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
